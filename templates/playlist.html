<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supergate Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Shared styles for header and layout */
        .app-container {
            display: grid;
            grid-template-areas:
                "header header"
                "main sidebar";
            grid-template-columns: 1fr 320px;
            grid-template-rows: 60px calc(100vh - 60px);
            height: 100vh;
        }

        .top-header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-subtle);
            z-index: 10;
        }

        .top-header-brand {
            font-weight: 600;
            font-size: 18px;
        }

        .top-header-brand .badge {
            font-size: 12px;
            vertical-align: middle;
            margin-left: 8px;
        }

        .top-header-nav a {
            text-decoration: none;
            color: var(--text-secondary);
            padding: 8px 12px;
            border-radius: 4px;
            margin-left: 8px;
            transition: background-color 0.2s, color 0.2s;
        }

        .top-header-nav a:hover {
            background-color: var(--bg-hover);
            color: var(--text-primary);
        }

        .top-header-nav a.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--text-accent);
        }

        .main-content {
            grid-area: main;
            overflow: hidden;
            /* Video area handles its own scrolling if needed, but usually fixed */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: var(--bg-app);
        }

        .right-sidebar {
            grid-area: sidebar;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: -4px 0 6px rgba(0, 0, 0, 0.2);
            z-index: 5;
        }

        .video-grid-container {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .video-cell {
            position: relative;
            background: #000;
        }

        .video-cell video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-cell .hls-log {
            position: absolute;
            bottom: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: #ccc;
            pointer-events: none;
        }

        .video-cell-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .overlay-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .rec-select {
            padding: 8px;
            border-radius: 4px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            min-width: 200px;
        }

        .video-cell-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 8px;
            display: flex;
            justify-content: flex-end;
            pointer-events: none;
            z-index: 4;
        }

        .video-cell-controls button {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .video-cell-controls button:hover {
            background: rgba(50, 50, 50, 0.8);
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header class="top-header">
            <div class="top-header-brand">
                <div class="logo">
                    <!-- Supergate Logo Icon -->
                    <svg viewBox="0 0 40 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0" y="4" width="6" height="16" rx="3" fill="#3B82F6" />
                        <rect x="10" y="4" width="6" height="16" rx="3" fill="#3B82F6" />
                        <rect x="20" y="4" width="6" height="16" rx="3" fill="#3B82F6" />
                    </svg>
                    supergate
                </div>
            </div>
            <nav class="top-header-nav">
                <a href="/">Dashboard</a>
                <a href="/tester">Tester</a>
                <a href="/playlist" class="active">Playlist</a>
                <a href="/live">Live Grid</a>
            </nav>
        </header>

        <main class="main-content">
            <div id="global-status-bar"
                style="padding: 8px; border-radius: 8px; background: #1e1e1e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-shrink: 0; text-align: center; color: #888; font-size: 14px;">
                Playlist View
            </div>

            <!-- Video Player Area (Fills remaining space) -->
            <div class="video-grid-container">
                {% for i in range(9) %}
                <div class="video-cell">
                    <div class="video-cell-overlay" id="overlay-{{ i }}">
                        <div class="overlay-content">
                            <select id="rec-select-{{ i }}" class="rec-select">
                                <option value="" disabled selected>Select Recording</option>
                            </select>
                            <button id="load-btn-{{ i }}" class="btn-primary">Load</button>
                        </div>
                    </div>
                    <div class="video-cell-controls">
                        <!-- Controls for when video is loaded, e.g. clear/change -->
                        <button id="change-btn-{{ i }}" class="btn-sm" style="display: none;">Change</button>
                    </div>
                    <div class="video-container">
                        <video id="hls-video-{{ i }}" controls muted></video>
                        <div id="no-video-placeholder-{{ i }}" class="no-video-placeholder" style="display: none;">
                            <div class="placeholder-icon">🚫</div>
                            <div>No Video Data</div>
                        </div>
                    </div>
                    <div id="hls-log-{{ i }}" class="hls-log">CH {{ i + 1 }}</div>
                </div>
                {% endfor %}
            </div>
        </main>

        <aside class="right-sidebar">
            <!-- Date Navigator -->
            <div class="date-nav"
                style="padding: 16px; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; background: #252525; flex-shrink: 0;">
                <button id="prev-day" class="nav-btn"
                    style="background: none; border: none; color: #fff; cursor: pointer; font-size: 18px;">&#9664;</button>
                <div class="date-display" style="position: relative;">
                    <input type="date" id="date-picker"
                        style="position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer;">
                    <span id="current-date-text"
                        style="font-weight: 600; font-size: 16px; cursor: pointer;">2025-11-24</span>
                </div>
                <button id="next-day" class="nav-btn"
                    style="background: none; border: none; color: #fff; cursor: pointer; font-size: 18px;">&#9654;</button>
            </div>

            <!-- Vertical Timeline Container -->
            <div class="timeline-container"
                style="flex-grow: 1; position: relative; overflow-y: hidden; padding: 10px 0;">
                <!-- Hour Markers and Segments will be drawn here -->
                <canvas id="timebar-canvas" width="280" height="1440"
                    style="display: block; margin: 0 auto; cursor: pointer;"></canvas>
            </div>
        </aside>
    </div>

    <!-- Floating Recording List -->
    <div id="floating-recording-list" class="floating-panel-container">
        <div class="floating-header" id="floating-header">
            <h3>Recording List</h3>
            <div>
                <button id="refresh-recordings" class="btn-icon" title="Refresh">🔄</button>
                <button id="toggle-floating" class="btn-icon" title="Minimize/Expand">_</button>
            </div>
        </div>
        <div class="floating-content">
            <table id="recordings-table" class="recordings-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>State</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="recordings-tbody">
                    <tr>
                        <td colspan="3" class="empty-state">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script src="{{ url_for('static', filename='playlist.js') }}"></script>
</body>

</html>
